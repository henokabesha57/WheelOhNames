services:
  - type: web
    name: django-wheel-app
    runtime: python
    plan: free
    autoDeploy: false
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py makemigrations
      python manage.py migrate
    startCommand: gunicorn core.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: wheel-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: wheel-redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,localhost,127.0.0.1
      - key: CSRF_TRUSTED_ORIGINS
        value: https://*.onrender.com
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: wheel-db
    plan: free
    databaseName: wheel_db
    user: wheel_user

redis:
  - name: wheel-redis
    plan: free
    maxmemoryPolicy: noeviction
    ipAllowList: []